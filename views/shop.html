<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Project</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
            <ul class="header">
                <li><a href="home.html">HOME</a></li>
                <li><a href="shop.html">STORE</a></li>
                <li><a href="aboutus.html">ABOUT</a></li>
                <li ><a class='cart' href="">CART</a><span class="cart-number" id="cart-number">0</span></li>
            </ul>
        <h1>The Generics</h1>
    </header>
    <section id="music" class="çontainer">
        <h2>MUSIC</h2>
        <div id="music-content" onclick="addToCart(event)">
            <div id="album1">
                <h3>Album 1</h3>
                <div class="image-container">
                    <img class="prod-images"  src="https://images.unsplash.com/photo-1477233534935-f5e6fe7c1159?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTJ8fG11c2ljfGVufDB8fDB8fA%3D%3D&auto=format&fit=crop&w=500&q=60">
                </div>
                <div class="product-details">
                    <span>$<span>12.99</span></span>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
            </div>
            <div id="album2">
                <h3>Album 2</h3>
                <div class="image-container">
                    <img class="prod-images"  src="https://images.unsplash.com/photo-1510915361894-db8b60106cb1?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTR8fG11c2ljfGVufDB8fDB8fA%3D%3D&auto=format&fit=crop&w=500&q=60">
                </div>
                <div class="product-details">
                    <span>$<span>11.99</span></span>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
            </div>
            <div id="album3">
                <h3>Album 3</h3>
                <div class="image-container">
                    <img class="prod-images"  src="https://images.unsplash.com/photo-1506157786151-b8491531f063?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTh8fG11c2ljfGVufDB8fDB8fA%3D%3D&auto=format&fit=crop&w=500&q=60">
                </div>
                <div class="product-details">
                    <span>$<span>110</span></span>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
            </div>
            <div id="album4">
                <h3>Album 4</h3>
                <div class="image-container">
                    <img class="prod-images"  src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8Mnx8bXVzaWN8ZW58MHx8MHx8&auto=format&fit=crop&w=500&q=60">
                </div>
                <div class="product-details">
                    <span>$<span>5.00</span></span>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
            </div>
        </div>
    </section>
    <section id="merch" class="çontainer">
        <h2>MERCH</h2>
        <div id="merch-content">
            <div id="tshirt">
                <h3>T Shirt</h3>
                <div class="image-container">
                    <img class="prod-images"  src="https://images.unsplash.com/photo-1576871337622-98d48d1cf531?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxzZWFyY2h8M3x8dHNoaXJ0fGVufDB8fDB8fA%3D%3D&auto=format&fit=crop&w=500&q=60">
                </div>
                <div class="product-details">
                    <span>$<span>12.99</span></span>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
            </div>
            <div id="coffeecup">
                <h3>Coffee Cup</h3>
                <div class="image-container">
                    <img class="prod-images"  src="https://images.unsplash.com/photo-1631764073436-700690151e38?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=387&q=80">
                </div>
                <div class="product-details">
                    <span>$<span>11.99</span></span>
                    <button class="add-to-cart">ADD TO CART</button>
                </div>
            </div>
        </div>
    </section>
    <section id="cart" class="çontainer">
        <h2>CART</h2>
        <button class="cancel" onclick="closeCart()">X</button>
        <div class="cart-row cart-header">
            <span class="cart-item cart-column">ITEM</span>
            <span class="cart-price cart-column">PRICE</span>
            <span class="cart-quantity cart-column">QUANTITY</span>
        </div>
        <div id="cart-items">
        </div>
        <div class="cart-total">
            <span>
                <span class="total-title"> <strong>Total</strong>
                    </span>
                $<span id="total-value">0</span>
            </span>
        </div>  
            <button class="purchase">Purchase</button>
        
    </section>
    <button class="cart-button" onclick="showCart()">See the Cart</button>  
    
    <div id="item-added">  
    </div>
    <script src="shop.js"></script>

    <footer>
        <h2>The Generics</h2> 
        <ul class="footer">
            <li><a href="http://youtube.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt=""></a></li>
            <li><a href="http://spotify.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" alt=""></a></li>
            <li><a href="http://facebook.com" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt=""></a></li>
        </ul>
    </footer>
</body>
</html>
